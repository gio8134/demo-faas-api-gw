<!DOCTYPE html>
<html lang="it">

<head>

    <meta charset="UTF-8">

    <title>Demo FaaS Gateway</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 40px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        h1 {
            margin-top: 0;
        }

        label {
            display: block;
            margin-top: 20px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        select,
        textarea,
        button,
        input {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            box-sizing: border-box;
        }

        input {
            background: #f0f0f0;
        }

        textarea {
            height: 180px;
            font-family: monospace;
        }

        button {
            margin-top: 20px;
            background: #1976d2;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #135ba1;
        }

        pre {
            margin-top: 20px;
            background: #222;
            color: #00ff88;
            padding: 15px;
            overflow: auto;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Demo FaaS API Gateway</h1>

    <label>Nome FaaS</label>

    <select
        id="nome-faas"
        onchange="updateFaasDetails()">
    </select>

    <label>FaaS URL</label>

    <input
        type="text"
        id="faas-url"
        readonly>

    <label>FaaS Namespace</label>

    <input
        type="text"
        id="faas-namespace"
        readonly>

    <label>Payload JSON</label>

    <textarea id="payload">
{
  "value": 10
}
    </textarea>

    <button onclick="invokeFaas()">
        Invoke FaaS
    </button>

    <pre id="result"></pre>

</div>

<script>

async function loadFaasList() {

    const response = await fetch("/faas");

    const lista = await response.json();

    const select = document.getElementById("nome-faas");

    select.innerHTML = "";

    lista.forEach(faas => {

        const option = document.createElement("option");

        option.value = faas["faas-url"];

        option.textContent = faas["faas-name"];

        option.dataset.namespace =
            faas["faas-namespace"];

        option.dataset.name =
            faas["faas-name"];

        option.dataset.url =
            faas["faas-url"];

        select.appendChild(option);
    });

    updateFaasDetails();
}


function updateFaasDetails() {

    const select =
        document.getElementById("nome-faas");

    const selectedOption =
        select.options[select.selectedIndex];

    if (!selectedOption) {
        return;
    }

    document.getElementById("faas-url").value =
        selectedOption.dataset.url || "";

    document.getElementById("faas-namespace").value =
        selectedOption.dataset.namespace || "";
}


async function invokeFaas() {

    const result =
        document.getElementById("result");

    result.textContent = "Loading...";

    try {

        const select =
            document.getElementById("nome-faas");

        const selectedOption =
            select.options[select.selectedIndex];

        const faasName =
            selectedOption.dataset.name;

        const faasUrl =
            selectedOption.dataset.url;

        const faasNamespace =
            selectedOption.dataset.namespace;

        const payloadText =
            document.getElementById("payload").value;

        let payload = JSON.parse(payloadText);

        // IMPORTANTE: il backend usa "nome-faas"
        payload["nome-faas"] = faasName;
        payload["faas-url"] = faasUrl;
        payload["faas-namespace"] = faasNamespace;

        // CHIAMATA AL GATEWAY (NON alla FaaS)
        const response = await fetch("/trigger", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        result.textContent =
            JSON.stringify(data, null, 2);

    } catch (err) {

        result.textContent =
            "ERROR:\n" + err;
    }
}

loadFaasList();

</script>

</body>

</html>
